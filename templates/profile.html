<!DOCTYPE html>
<html lang="en">
<head>
    <title>Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-indigo-100 via-white to-purple-100 min-h-screen flex items-center justify-center">

<div class="max-w-4xl w-full p-6">
    
    <div class="bg-white/70 backdrop-blur-lg rounded-3xl shadow-xl p-8 border border-white/40">
        
        <!-- Header -->
        <div class="flex items-center gap-6 mb-8">
            <div class="w-20 h-20 rounded-full bg-indigo-600 text-white flex items-center justify-center text-2xl font-bold">
                {{ user.username|slice:":1"|upper }}
            </div>

            <div>
                <h2 class="text-2xl font-extrabold text-slate-800">{{ user.username }}</h2>
                <p class="text-slate-500">{{ user.email }}</p>
            </div>
        </div>

        <!-- Stats -->
        <div class="grid grid-cols-2 gap-6 mb-8">
            <div class="bg-indigo-50 p-6 rounded-2xl">
                <p class="text-sm text-slate-500">Total Bookings</p>
                <p class="text-2xl font-bold text-indigo-600">{{ user.booking_set.count }}</p>
            </div>

            <div class="bg-green-50 p-6 rounded-2xl">
                <p class="text-sm text-slate-500">Status</p>
                <p class="text-2xl font-bold text-green-600">Active</p>
            </div>
        </div>

        <!-- Buttons -->
        <div class="flex gap-4">
            <a href="/booking-history/" class="bg-indigo-600 text-white px-6 py-3 rounded-xl font-semibold">
                📜 Booking History
            </a>

            <a href="/" class="border px-6 py-3 rounded-xl font-semibold">
                ← Back Home
            </a>
        </div>

    </div>

</div>

</body>
</html>
