<!DOCTYPE html>
<html>
<head>
    <title>Become a Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded-2xl shadow w-96">
    <h2 class="text-xl font-bold mb-4">Become a Provider</h2>

    <form method="POST">
        {% csrf_token %}

        <input name="name" placeholder="Name" class="w-full mb-3 p-2 border rounded">
        <input name="skill" placeholder="Skill" class="w-full mb-3 p-2 border rounded">
        <input name="rate" placeholder="Rate" class="w-full mb-3 p-2 border rounded">
        <input name="location" placeholder="Location" class="w-full mb-3 p-2 border rounded">

        <button class="bg-indigo-600 text-white w-full py-2 rounded">
            Submit
        </button>
    </form>
</div>

</body>
</html>
