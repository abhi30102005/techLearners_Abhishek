<!DOCTYPE html>
<html lang="en">
<head>
    <title>Booking History</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen">

<div class="max-w-6xl mx-auto mt-20 px-6">

    <h2 class="text-3xl font-extrabold mb-8 text-center">📜 Your Bookings</h2>

    <div class="grid md:grid-cols-2 gap-6">

        {% for booking in bookings %}

        <div class="bg-white p-6 rounded-2xl shadow hover:shadow-xl transition border border-gray-100">

            <!-- HEADER -->
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold text-gray-800">
                    {{ booking.provider.name }}
                </h3>

                <span class="text-xs px-3 py-1 bg-green-100 text-green-700 rounded-full">
                    Confirmed
                </span>
            </div>

            <!-- DETAILS -->
            <div class="space-y-2 text-gray-600">
                <p><strong>Service:</strong> {{ booking.provider.skill }}</p>
                <p><strong>Time:</strong> {{ booking.time }}</p>
            </div>

            <!-- DIVIDER -->
            <div class="border-t my-4"></div>

            <!-- ⭐ REVIEW SECTION -->
            <form onsubmit="submitReview(event, {{ booking.id }})" 
                  class="flex flex-col md:flex-row gap-3">

                <select id="rating{{ booking.id }}" 
                        class="border p-2 rounded w-full md:w-auto">
                    <option value="5">⭐⭐⭐⭐⭐</option>
                    <option value="4">⭐⭐⭐⭐</option>
                    <option value="3">⭐⭐⭐</option>
                    <option value="2">⭐⭐</option>
                    <option value="1">⭐</option>
                </select>

                <input type="text" 
                       id="comment{{ booking.id }}" 
                       placeholder="Write your review..."
                       class="border p-2 rounded flex-1">

                <button 
                    class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded transition">
                    Submit
                </button>

            </form>

        </div>

        {% empty %}

        <div class="col-span-2 text-center text-gray-500 text-lg">
            No bookings yet 😔
        </div>

        {% endfor %}

    </div>

</div>


<!-- ✅ JAVASCRIPT -->
<script>

function getCSRFToken() {
    let cookieValue = null;
    let cookies = document.cookie.split(';');

    for (let i = 0; i < cookies.length; i++) {
        let cookie = cookies[i].trim();
        if (cookie.startsWith('csrftoken=')) {
            cookieValue = cookie.substring('csrftoken='.length);
        }
    }

    return cookieValue;
}

async function submitReview(event, bookingId) {
    event.preventDefault();

    const rating = document.getElementById("rating" + bookingId).value;
    const comment = document.getElementById("comment" + bookingId).value;

    try {
        const response = await fetch("/api/review/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": getCSRFToken()   // ✅ FIXED
            },
            body: JSON.stringify({
                booking_id: bookingId,
                rating: rating,
                comment: comment
            })
        });

        const data = await response.json();

        if (data.status) {
            alert("✅ Review added successfully!");
        } else {
            alert("❌ Failed to add review");
        }

    } catch (error) {
        alert("⚠️ Server error");
    }
}
</script>

</body>
</html>
