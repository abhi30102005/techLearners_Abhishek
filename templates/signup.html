<!DOCTYPE html>
<html lang="en">
<head>
    <title>Signup | Neighbour Assist</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

    <div class="bg-white p-8 rounded-2xl shadow-lg w-96">
        <h2 class="text-2xl font-bold mb-6 text-center">Signup</h2>

        <form method="POST">
            {% csrf_token %}

            <input type="text" name="name" placeholder="Full Name"
                class="w-full mb-4 p-3 border rounded-xl" required>

            <input type="email" name="email" placeholder="Email"
                class="w-full mb-4 p-3 border rounded-xl" required>

            <input type="password" name="password" placeholder="Password"
                class="w-full mb-4 p-3 border rounded-xl" required>

            <button class="w-full bg-green-600 text-white py-3 rounded-xl font-bold">
                Signup
            </button>
        </form>

        <p class="text-center mt-4 text-sm">
            Already have an account?
            <a href="/login/" class="text-indigo-600">Login</a>
        </p>
    </div>

</body>
</html>
